<!DOCTYPE html>
<html>
    <head>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
        <link href="style.css" rel="stylesheet">
        <title>My Daily Time & Goals Tracker</title>
    </head>
    <body>
        <div id="app">
            <div id="header">
                <h1>My Daily Time & Goals Tracker</h1>
            </div>
            <div id="upload-section">
                <label for="fileInput" class="button">Upload</label>
                <input type="file" id="fileInput" accept=".json" hidden>
            </div>
            <div id="chart-section">
                <h2>Activity Chart</h2>
                <canvas id="chart"></canvas>
            </div>
            <div id="goal-section">
                <h2>Goal Results</h2>
                <ul id="goals"></ul>
                <div id="goalSummary"></div>
            </div>
            <div id="reset-section">
                <button id="resetButton" class="button">Reset</button>
            </div>
            <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
            <script src="script.js"></script>
        </div>
    </body>
</html>
